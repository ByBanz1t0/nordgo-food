<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NordGo | Meu Carrinho</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="body-carrinho">
    <div id="toast-container" class="toast-container"></div>

    <!-- Primeiro erro: Header idêntico ao loja.html -->
    <header class="main-header header-loja">
        <div class="header-container">
            <div class="header-left">
                <button onclick="window.history.back()" class="btn-back">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>Voltar</span>
                </button>
            </div>
            <div class="header-center">
                <span id="header-nome-loja">Meu Carrinho</span>
            </div>
            <div class="header-right">
                <!-- Espaço vazio para manter o alinhamento -->
            </div>
        </div>
    </header>

    <main class="container">
        <div id="carrinho-vazio" class="hidden">
            <div class="vazio-content">
                <i class="fa-solid fa-cart-plus"></i>
                <h3>Seu carrinho está vazio</h3>
                <p>Que tal explorar as delícias da região?</p>
                <a href="../index.html" class="btn-primario">Explorar Lojas</a>
            </div>
        </div>

        <div id="conteudo-carrinho" class="carrinho-layout">
            <section class="coluna-itens" id="lista-lojas-carrinho"></section>

            <aside class="coluna-resumo">
                <div class="card-resumo">
                    <h3>Resumo Geral</h3>
                    
                    <div class="cupom-global-area">
                        <label>Cupom NordGo (Geral)</label>
                        <div class="input-group">
                            <input type="text" id="cupom-plataforma" placeholder="Código promocional">
                            <button id="btn-aplicar-global" class="btn-aplicar">Aplicar</button>
                        </div>
                    </div>

                    <div class="resumo-detalhes">
                        <div class="linha-resumo">
                            <span>Soma dos produtos</span>
                            <span id="subtotal-geral">R$ 0,00</span>
                        </div>
                        <div class="linha-resumo">
                            <span>Total de entregas</span>
                            <span id="total-entregas">R$ 0,00</span> <!-- Ajuste 4: Frete zerado -->
                        </div>
                        <div class="linha-resumo desconto hidden" id="linha-desconto-global">
                            <span>Desconto</span>
                            <span id="desconto-global">- R$ 0,00</span>
                        </div>
                        <hr>
                        <div class="linha-resumo total">
                            <span>Total a pagar</span>
                            <span id="valor-total-final">R$ 0,00</span>
                        </div>
                    </div>

                    <button id="btn-finalizar" class="btn-finalizar-checkout">Finalizar Pedido</button>
                </div>
            </aside>
        </div>
    </main>

    <script type="module">
        import { db, auth } from '../js/firebase-config.js';
        import { 
            collection, addDoc, query, where, getDocs, limit, 
            updateDoc, doc, increment, arrayUnion, serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const listaLojasHtml = document.getElementById('lista-lojas-carrinho');
        let cupomAtivo = null;

        // --- LÓGICA DE CUPONS ---
        async function validarCupom(codigo, lojaId = null) {
            const user = auth.currentUser;
            if (!user) { alert("Faça login para usar cupons."); return null; }

            const q = query(collection(db, "cupons"), where("codigo", "==", codigo.toUpperCase()), where("ativo", "==", true), limit(1));
            const snapshot = await getDocs(q);

            if (snapshot.empty) { alert("Cupom inválido."); return null; }

            const cupomDoc = snapshot.docs[0];
            const data = cupomDoc.data();
            const agora = new Date();

            if (data.escopo === "local" && data.lojaId !== lojaId) { alert("Cupom não válido para esta loja."); return null; }
            if (data.usuariosQueUsaram && data.usuariosQueUsaram.includes(user.uid)) { alert("Você já usou este cupom."); return null; }
            if (data.validadeTipo === "usos" && data.usosAtuais >= parseInt(data.validade)) { alert("Cupom esgotado."); return null; }
            if (data.validadeTipo === "tempo") {
                const diffMinutos = (agora - data.dataCriacao.toDate()) / (1000 * 60);
                if (diffMinutos > parseInt(data.validade)) { alert("Cupom expirado por tempo."); return null; }
            }

            return { id: cupomDoc.id, ...data };
        }

        document.getElementById('btn-aplicar-global').addEventListener('click', async () => {
            const codigo = document.getElementById('cupom-plataforma').value;
            const validado = await validarCupom(codigo);
            if (validado) {
                cupomAtivo = validado;
                alert(`Cupom ${codigo} aplicado!`);
                carregarCarrinho();
            }
        });

        // --- LÓGICA DO CARRINHO ---
        window.alterarQtd = (id, delta) => {
            let car = JSON.parse(localStorage.getItem('nordgo_carrinho')) || [];
            const i = car.findIndex(p => p.id === id);
            if (i !== -1) {
                car[i].quantidade += delta;
                if (car[i].quantidade <= 0) car.splice(i, 1);
                localStorage.setItem('nordgo_carrinho', JSON.stringify(car));
                carregarCarrinho();
            }
        };

        function carregarCarrinho() {
            const itens = JSON.parse(localStorage.getItem('nordgo_carrinho')) || [];
            if (itens.length === 0) {
                document.getElementById('carrinho-vazio').classList.remove('hidden');
                document.getElementById('conteudo-carrinho').classList.add('hidden');
                return;
            }
            const agrupados = itens.reduce((acc, item) => {
                const lid = item.lojaId || 'outros';
                if (!acc[lid]) acc[lid] = [];
                acc[lid].push(item);
                return acc;
            }, {});
            renderizar(agrupados);
            calcular(itens, Object.keys(agrupados).length);
        }

        function renderizar(lojas) {
            listaLojasHtml.innerHTML = '';
            for (const lid in lojas) {
                const itens = lojas[lid];
                let subtotalLoja = itens.reduce((acc, i) => acc + (i.preco * i.quantidade), 0);

                // Segundo erro corrigido: itens[0].nomeLoja garante o nome dinâmico da loja
                let h = `<div class="card-loja-carrinho">
                    <div class="header-loja-carrinho">
                        <i class="fa-solid fa-store"></i> 
                        <span>${itens[0].nomeLoja || 'Loja'}</span>
                    </div>
                    <div class="itens-container">`;
                
                itens.forEach(item => {
                    h += `<div class="item-carrinho-simples">
                        <img src="${item.imagem || '../assets/images/placeholder.png'}">
                        <div class="info-item">
                            <h4>${item.nome}</h4>
                            <span>R$ ${item.preco.toFixed(2)}</span>
                        </div>
                        <div class="controles-qtd-carrinho">
                            <button onclick="alterarQtd('${item.id}', -1)"><i class="fa-solid fa-minus"></i></button>
                            <span>${item.quantidade}</span>
                            <button onclick="alterarQtd('${item.id}', 1)"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>`;
                });

                // Terceiro erro: Campo de cupom e subtotal da loja ao lado direito
                h += `</div>
                    <div class="footer-loja-carrinho">
                        <div class="campo-cupom-loja">
                            <input type="text" placeholder="Cupom da loja" id="cupom-${lid}">
                            <button class="btn-aplicar-loja">Aplicar</button>
                        </div>
                        <div class="subtotal-loja-container">
                            <span class="label-sub">Subtotal Loja</span>
                            <span class="valor-sub">R$ ${subtotalLoja.toFixed(2)}</span>
                        </div>
                    </div>
                </div>`;
                
                listaLojasHtml.innerHTML += h;
            }
        }

        function calcular(itens, nLojas) {
            const sub = itens.reduce((acc, i) => acc + (i.preco * i.quantidade), 0);
            // Quarto erro: Frete zerado para implementação futura
            const frete = 0; 
            let desc = 0;

            if (cupomAtivo) {
                desc = cupomAtivo.tipo === "porcentagem" ? (sub * cupomAtivo.valor / 100) : cupomAtivo.valor;
                document.getElementById('linha-desconto-global').classList.remove('hidden');
                document.getElementById('desconto-global').innerText = `- R$ ${desc.toFixed(2)}`;
            }

            document.getElementById('subtotal-geral').innerText = `R$ ${sub.toFixed(2)}`;
            document.getElementById('total-entregas').innerText = frete === 0 ? "Grátis" : `R$ ${frete.toFixed(2)}`;
            document.getElementById('valor-total-final').innerText = `R$ ${(sub + frete - desc).toFixed(2)}`;
        }

        document.getElementById('btn-finalizar').addEventListener('click', async () => {
            const user = auth.currentUser;
            const itens = JSON.parse(localStorage.getItem('nordgo_carrinho')) || [];
            if (!user || itens.length === 0) return;

            try {
                await addDoc(collection(db, "pedidos"), {
                    clientId: user.uid,
                    itens: itens,
                    status: "pendente",
                    data: serverTimestamp(),
                    total: parseFloat(document.getElementById('valor-total-final').innerText.replace('R$ ', '').replace(',', '.'))
                });

                if (cupomAtivo) {
                    await updateDoc(doc(db, "cupons", cupomAtivo.id), {
                        usosAtuais: increment(1),
                        usuariosQueUsaram: arrayUnion(user.uid)
                    });
                }

                localStorage.removeItem('nordgo_carrinho');
                alert("Pedido realizado com sucesso!");
                window.location.href = "../index.html";
            } catch (err) { console.error(err); }
        });

        carregarCarrinho();
    </script>
</body>
</html>
