<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NordGo | Meu Carrinho</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="body-carrinho">
    <div id="toast-container" class="toast-container"></div>

    <header class="main-header">
        <div class="header-container">
            <div class="header-left">
                <button onclick="window.history.back()" class="btn-back-header">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <h1 class="titulo-pagina">Meu Carrinho</h1>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Carrinho Vazio -->
        <div id="carrinho-vazio" class="hidden">
            <div class="vazio-content">
                <i class="fa-solid fa-cart-plus"></i>
                <h3>Seu carrinho está vazio</h3>
                <p>Que tal explorar as delícias da região?</p>
                <a href="../index.html" class="btn-primario">Explorar Lojas</a>
            </div>
        </div>

        <div id="conteudo-carrinho" class="carrinho-layout">
            <!-- Coluna da Esquerda: Itens agrupados -->
            <section class="coluna-itens" id="lista-lojas-carrinho">
                <!-- Blocos de lojas e itens injetados aqui -->
            </section>

            <!-- Coluna da Direita: Resumo Geral -->
            <aside class="coluna-resumo">
                <div class="card-resumo">
                    <h3>Resumo Geral</h3>
                    
                    <!-- Cupom da Plataforma -->
                    <div class="cupom-global-area">
                        <label>Cupom NordGo (Geral)</label>
                        <div class="input-group">
                            <input type="text" id="cupom-plataforma" placeholder="Código promocional">
                            <button class="btn-aplicar">Aplicar</button>
                        </div>
                    </div>

                    <div class="resumo-detalhes">
                        <div class="linha-resumo">
                            <span>Soma dos produtos</span>
                            <span id="subtotal-geral">R$ 0,00</span>
                        </div>
                        <div class="linha-resumo">
                            <span>Total de entregas</span>
                            <span id="total-entregas">R$ 0,00</span>
                        </div>
                        <div class="linha-resumo desconto hidden" id="linha-desconto-global">
                            <span>Desconto Plataforma</span>
                            <span id="desconto-global">- R$ 0,00</span>
                        </div>
                        <hr>
                        <div class="linha-resumo total">
                            <span>Total a pagar</span>
                            <span id="valor-total-final">R$ 0,00</span>
                        </div>
                    </div>

                    <button id="btn-finalizar" class="btn-finalizar-checkout">
                        Finalizar Todos os Pedidos
                    </button>
                </div>
            </aside>
        </div>
    </main>

    <script type="module">
        import { db, auth } from '../js/firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const listaLojasHtml = document.getElementById('lista-lojas-carrinho');
        
        // Função para agrupar itens por loja
        function agruparPorLoja(itens) {
            return itens.reduce((acc, item) => {
                const lojaId = item.lojaId || 'outros';
                if (!acc[lojaId]) acc[lojaId] = [];
                acc[lojaId].push(item);
                return acc;
            }, {});
        }

        window.alterarQtd = function(produtoId, delta) {
            let carrinho = JSON.parse(localStorage.getItem('nordgo_carrinho')) || [];
            const index = carrinho.findIndex(p => p.id === produtoId);
            
            if (index !== -1) {
                carrinho[index].quantidade += delta;
                if (carrinho[index].quantidade <= 0) carrinho.splice(index, 1);
                
                localStorage.setItem('nordgo_carrinho', JSON.stringify(carrinho));
                carregarCarrinho();
            }
        };

        function carregarCarrinho() {
            const itens = JSON.parse(localStorage.getItem('nordgo_carrinho')) || [];
            
            if (itens.length === 0) {
                document.getElementById('carrinho-vazio').classList.remove('hidden');
                document.getElementById('conteudo-carrinho').classList.add('hidden');
                return;
            }

            document.getElementById('carrinho-vazio').classList.add('hidden');
            document.getElementById('conteudo-carrinho').classList.remove('hidden');

            const lojasAgrupadas = agruparPorLoja(itens);
            renderizarLojas(lojasAgrupadas);
            calcularTotaisGerais(itens, Object.keys(lojasAgrupadas).length);
        }

        function renderizarLojas(lojas) {
            listaLojasHtml.innerHTML = '';
            
            for (const lojaId in lojas) {
                const itensDaLoja = lojas[lojaId];
                const nomeLoja = itensDaLoja[0].nomeLoja || "Loja"; // Ideal ter o nome da loja no objeto do item

                let htmlLoja = `
                    <div class="card-loja-carrinho" data-loja-id="${lojaId}">
                        <div class="header-loja-carrinho">
                            <i class="fa-solid fa-store"></i>
                            <span>${nomeLoja}</span>
                        </div>
                        <div class="lista-produtos-loja">
                `;

                itensDaLoja.forEach(item => {
                    htmlLoja += `
                        <div class="item-carrinho-simples">
                            <img src="${item.imagem || '../assets/images/placeholder.png'}" alt="${item.nome}">
                            <div class="info-item">
                                <h4>${item.nome}</h4>
                                <span class="preco-unitario">R$ ${item.preco.toLocaleString('pt-br', {minimumFractionDigits: 2})}</span>
                            </div>
                            <div class="controles-qtd-carrinho">
                                <button onclick="alterarQtd('${item.id}', -1)"><i class="fa-solid fa-minus"></i></button>
                                <span>${item.quantidade}</span>
                                <button onclick="alterarQtd('${item.id}', 1)"><i class="fa-solid fa-plus"></i></button>
                            </div>
                        </div>
                    `;
                });

                // Campo de Cupom específico da Loja
                htmlLoja += `
                        </div>
                        <div class="cupom-loja-area">
                            <input type="text" placeholder="Cupom da ${nomeLoja}" class="input-cupom-loja">
                            <button class="btn-link-aplicar">Aplicar</button>
                        </div>
                    </div>
                `;
                
                listaLojasHtml.innerHTML += htmlLoja;
            }
        }

        function calcularTotaisGerais(itens, qtdLojas) {
            const subtotal = itens.reduce((acc, item) => acc + (item.preco * item.quantidade), 0);
            const taxaPorLoja = 5.00; // Aqui você pode buscar a taxa real de cada loja no futuro
            const totalEntrega = qtdLojas * taxaPorLoja;

            document.getElementById('subtotal-geral').innerText = `R$ ${subtotal.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;
            document.getElementById('total-entregas').innerText = `R$ ${totalEntrega.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;
            document.getElementById('valor-total-final').innerText = `R$ ${(subtotal + totalEntrega).toLocaleString('pt-br', {minimumFractionDigits: 2})}`;
        }

        carregarCarrinho();
    </script>
</body>
</html>
