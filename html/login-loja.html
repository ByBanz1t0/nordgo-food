<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda na Nordgo | Nordgo Food</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/styles-login.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    
    <header class="main-header">
        <div class="header-container">
            <div class="header-left">
                <div class="pill-badge pill-back" onclick="window.location.href='../index.html'">
                    <img src="../assets/images/voltar.png" alt="Voltar" class="back-icon-img">
                    <span class="location-text">Voltar</span>
                </div>
            </div>
            
            <div class="header-center">
                <div class="pill-badge pill-page-title">
                    <span class="page-title-text">Seja Parceiro</span>
                </div>
            </div>
            
            <div class="header-right" id="user-area">
                <div class="user-loading-placeholder"></div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="login-container profile-page">
            <div id="section-criar-loja" class="hidden">
                <header class="login-header">
                    <div class="badge-vendedor">Nova Loja</div>
                    <h2>Seja um parceiro Nordgo</h2>
                    <p>Configure os dados iniciais do seu estabelecimento</p>
                </header>

                <div class="login-form grid-cadastro">
                    <h3 class="full-width"><i class="fa-solid fa-store"></i> Informações Básicas</h3>
                    
                    <input type="text" id="loja-nome" class="full-width" placeholder="Nome da Loja (Ex: Ninkos Cookies)">
                    
                    <input type="text" id="loja-cpf-cnpj" placeholder="CPF ou CNPJ" maxlength="18">
                    
                    <div class="custom-select-wrapper">
                        <div class="custom-select-trigger" id="categoria-trigger">
                            <span id="categoria-selected-text" style="color: #a0a8b5;">Categoria da Loja</span>
                            <i class="fa-solid fa-chevron-down"></i>
                        </div>
                        <div class="custom-options-box" id="categoria-options"></div>
                        <input type="hidden" id="loja-categoria" value="">
                    </div>

                    <textarea id="loja-descricao" class="full-width" placeholder="Descrição curta da loja" rows="2"></textarea>

                    <h3 class="full-width" style="margin-top: 15px;"><i class="fa-solid fa-location-dot"></i> Endereço da Loja</h3>
                    
                    <input type="text" id="loja-cep" placeholder="CEP" maxlength="9">
                    <input type="text" id="loja-bairro" placeholder="Bairro">
                    
                    <input type="text" id="loja-cidade" placeholder="Cidade" readonly class="input-bloqueado" style="background: #eee; cursor: not-allowed;">
                    <input type="text" id="loja-estado" placeholder="UF" readonly class="input-bloqueado" style="background: #eee; cursor: not-allowed;">
                    
                    <input type="text" id="loja-rua" class="full-width" placeholder="Rua / Avenida">
                    <input type="text" id="loja-numero" placeholder="Número">
                    <input type="text" id="loja-complemento" placeholder="Complemento (Opcional)">

                    <button id="btn-finalizar-loja" class="btn-principal full-width btn-success" style="margin-top: 20px;">
                        <i class="fa-solid fa-rocket"></i> Criar minha loja
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, db, mostrarNotificacao } from '../js/firebase-config.js';
        import { doc, getDoc, getDocs, updateDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const containerCadastro = document.getElementById('section-criar-loja');
        
        const selectWrapper = document.querySelector('.custom-select-wrapper');
        const selectTrigger = document.getElementById('categoria-trigger');
        const selectedText = document.getElementById('categoria-selected-text');
        const optionsBox = document.getElementById('categoria-options');
        const inputHiddenCategoria = document.getElementById('loja-categoria');

        selectTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            selectWrapper.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            selectWrapper.classList.remove('active');
        });

        // Máscara Dinâmica CPF/CNPJ
        document.getElementById('loja-cpf-cnpj').oninput = (e) => {
            let v = e.target.value.replace(/\D/g, "");
            if (v.length <= 11) {
                v = v.replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            } else {
                v = v.replace(/^(\d{2})(\d)/, "$1.$2").replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3").replace(/\.(\d{3})(\d)/, ".$1/$2").replace(/(\d{4})(\d)/, "$1-$2");
            }
            e.target.value = v;
        };

        // Máscara Dinâmica de CEP
        const aplicarMascaraCEP = (valor) => {
            return valor.replace(/\D/g, "").replace(/^(\d{5})(\d)/, "$1-$2");
        };
        
        document.getElementById('loja-cep').oninput = (e) => e.target.value = aplicarMascaraCEP(e.target.value);

        document.getElementById('loja-cep').addEventListener('blur', async (e) => {
            const cep = e.target.value.replace(/\D/g, "");
            
            if (cep.length !== 8) {
                if (cep.length > 0) mostrarNotificacao("CEP incompleto.", "error");
                return;
            }

            const inputBairro = document.getElementById('loja-bairro');
            const inputCidade = document.getElementById('loja-cidade');
            const inputEstado = document.getElementById('loja-estado');
            const inputRua = document.getElementById('loja-rua');

            try {
                inputCidade.value = "Buscando...";
                
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const dados = await response.json();

                if (dados.erro) {
                    mostrarNotificacao("CEP não encontrado.", "error");
                    inputCidade.value = "";
                    return;
                }

                inputCidade.value = dados.localidade;
                inputEstado.value = dados.uf;

                if (dados.bairro && dados.bairro.trim() !== "") {
                    inputBairro.value = dados.bairro;
                    inputBairro.readOnly = true;
                    inputBairro.classList.add('input-bloqueado');
                } else {
                    inputBairro.value = "";
                    inputBairro.readOnly = false;
                    inputBairro.classList.remove('input-bloqueado');
                    inputBairro.placeholder = "Informe o bairro";
                }

                inputRua.value = dados.logradouro || "";
                document.getElementById('loja-numero').focus();

            } catch (err) {
                console.error("Erro ViaCEP:", err);
                mostrarNotificacao("Serviço de busca de CEP offline.", "error");
                inputCidade.value = "";
            }
        });

        async function carregarCategorias() {
            try {
                const querySnapshot = await getDocs(collection(db, "categorias"));
                optionsBox.innerHTML = ""; 

                querySnapshot.forEach((docSnap) => {
                    const nomeCat = docSnap.data().nome;
                    
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'custom-option';
                    optionDiv.textContent = nomeCat;
                    optionDiv.setAttribute('data-value', nomeCat);

                    optionDiv.addEventListener('click', (e) => {
                        e.stopPropagation();
                        
                        inputHiddenCategoria.value = nomeCat;
                        selectedText.textContent = nomeCat;
                        selectedText.removeAttribute('style'); 

                        document.querySelectorAll('.custom-option').forEach(opt => opt.classList.remove('selected'));
                        optionDiv.classList.add('selected');

                        selectWrapper.classList.remove('active');
                    });

                    optionsBox.appendChild(optionDiv);
                });
            } catch (e) { console.error("Erro categories:", e); }
        }

        // MONITOR DE SEGURANÇA: Bloqueia a criação de lojas por usuários banidos
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }

            try {
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                const userData = userDoc.data();

                // Trava ativa antievasão
                if (userData?.status === "suspenso") {
                    mostrarNotificacao("Sua conta está suspensa. Acesso negado.", "error");
                    await signOut(auth);
                    setTimeout(() => window.location.href = 'login.html', 1500);
                    return;
                }

                if (userData?.loja) {
                    window.location.href = 'perfil-loja.html';
                    return; 
                }

                await carregarCategorias();
                containerCadastro.classList.remove('hidden');

            } catch (error) {
                console.error("Erro no Auth:", error);
                mostrarNotificacao("Erro ao validar acesso.", "error");
            }
        });

        document.getElementById('btn-finalizar-loja').onclick = async () => {
            const user = auth.currentUser;
            const btn = document.getElementById('btn-finalizar-loja');
            
            const cidadeRaw = document.getElementById('loja-cidade').value.trim();
            const estadoRaw = document.getElementById('loja-estado').value.trim().toUpperCase();

            // MODIFICADO: cidadeLoja agora salva no formato unificado 'Cidade - UF'
            const dadosLoja = {
                nome: document.getElementById('loja-nome').value.trim(),
                cpfCnpj: document.getElementById('loja-cpf-cnpj').value.trim(),
                categoria: inputHiddenCategoria.value, 
                descricao: document.getElementById('loja-descricao').value.trim(),
                cepLoja: document.getElementById('loja-cep').value.trim(),
                bairroLoja: document.getElementById('loja-bairro').value.trim(),
                cidadeLoja: `${cidadeRaw} - ${estadoRaw}`, 
                estadoLoja: estadoRaw,
                ruaLoja: document.getElementById('loja-rua').value.trim(),
                numeroLoja: document.getElementById('loja-numero').value.trim(),
                complementoLoja: document.getElementById('loja-complemento').value.trim(),
                donoUid: user.uid,
                status: "pendente",
                criadoEm: new Date(),
                temaLoja: "#ff4757"
            };

            if (!dadosLoja.nome || !dadosLoja.cpfCnpj || !dadosLoja.categoria || !cidadeRaw) {
                mostrarNotificacao("Preencha Nome, Documento, Categoria e um CEP válido.", "error");
                return;
            }

            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Criando Loja...';

                const lojaRef = await addDoc(collection(db, "lojas"), dadosLoja);
                
                await updateDoc(doc(db, "usuarios", user.uid), { 
                    tipo: "dono",
                    loja: lojaRef.id 
                });

                mostrarNotificacao("Loja criada com sucesso!");
                setTimeout(() => window.location.href = 'perfil-loja.html', 1500);
            } catch (e) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-rocket"></i> Criar minha loja';
                mostrarNotificacao("Erro ao salvar os dados.", "error");
            }
        };
    </script>
</body>
</html>
