<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nordgo Food | Autenticação</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/styles-login.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    
    <header class="main-header">
        <div class="header-container">
            <div class="header-left">
                <div class="pill-badge pill-back" id="btn-voltar-index">
                    <img src="../assets/images/voltar.png" alt="Voltar" class="back-icon-img">
                    <span class="location-text">Voltar</span>
                </div>
            </div>

            <div class="header-center">
                <div class="pill-badge pill-page-title">
                    <span class="page-title-text" id="header-dinamico-titulo">Login</span>
                </div>
            </div>

            <div class="header-right"></div>
        </div>
    </header>

    <main class="login-screen">
        <div class="login-container">
            
            <div id="section-skeleton">
                <div class="login-header">
                    <div class="skeleton skeleton-title"></div>
                    <div class="skeleton skeleton-subtitle"></div>
                </div>
                <div class="login-form">
                    <div class="skeleton skeleton-input"></div>
                    <div class="skeleton skeleton-input"></div>
                    <div class="skeleton skeleton-button"></div>
                    <div class="skeleton skeleton-link"></div>
                </div>
            </div>

            <div id="section-login" class="hidden">
                <header class="login-header">
                    <h2>Bem-vindo</h2>
                    <p>Acesse sua conta</p>
                </header>
                <div class="login-form">
                    <input type="email" id="email" placeholder="E-mail">
                    <input type="password" id="senha" placeholder="Senha">
                    
                    <div class="recovery-area">
                        <a href="#" id="btn-esqueci-senha">Esqueceu a senha?</a>
                    </div>

                    <button id="btn-login" class="btn-principal btn-entrar">Entrar</button>
                    
                    <div class="divider">ou</div>
                    
                    <button id="btn-google" class="btn-principal btn-google">
                        <i class="fa-brands fa-google"></i> Entrar com Google
                    </button>
                    
                    <div class="form-footer">
                        <p>Não tem uma conta ainda? 
                            <a href="#" id="link-ir-cadastro">Cadastre-se já!</a>
                        </p>
                    </div>
                </div>
            </div>

            <div id="section-cadastro" class="hidden">
                <header class="login-header">
                    <h2>Crie sua conta</h2>
                    <p>Preencha seus dados de entrega</p>
                </header>
                <div class="login-form grid-cadastro">
                    <input type="text" id="reg-nome" class="full-width" placeholder="Nome Completo">
                    <input type="email" id="reg-email" class="full-width" placeholder="E-mail">
                    <input type="password" id="reg-senha" class="full-width" placeholder="Senha (Mín. 8 caracteres, A-Z, 123, !@#)">
                    
                    <input type="text" id="reg-cpf" placeholder="CPF (000.000.000-00)" maxlength="14">
                    <input type="text" id="reg-telefone" placeholder="Telefone / WhatsApp" maxlength="15">
                    
                    <input type="text" id="reg-cep" placeholder="CEP (00000-000)" maxlength="9">
                    <input type="text" id="reg-bairro" placeholder="Bairro">
                    
                    <input type="text" id="reg-cidade" placeholder="Cidade" readonly class="input-bloqueado">
                    <input type="text" id="reg-estado" placeholder="UF" readonly class="input-bloqueado">
                    
                    <input type="text" id="reg-rua" class="full-width" placeholder="Rua / Avenida">
                    
                    <input type="text" id="reg-numero" placeholder="Número">
                    <input type="text" id="reg-obs" placeholder="Complemento/Obs">
                    
                    <button id="btn-cadastrar-final" class="btn-principal full-width btn-success">Finalizar Cadastro</button>
                    <button id="btn-voltar-login" class="btn-principal full-width btn-secondary">Voltar</button>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { auth, db, mostrarNotificacao } from '../js/firebase-config.js';
        import { 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            GoogleAuthProvider, 
            signInWithPopup,
            sendPasswordResetEmail,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const sectionLogin = document.getElementById('section-login');
        const sectionCadastro = document.getElementById('section-cadastro');
        const sectionSkeleton = document.getElementById('section-skeleton');
        const txtTituloHeader = document.getElementById('header-dinamico-titulo');

        // Botão de voltar do header
        document.getElementById('btn-voltar-index').onclick = () => {
            window.location.href = '../index.html';
        };

        // Lógica de Skeleton: Troca o placeholder pelo conteúdo real
        onAuthStateChanged(auth, (user) => {
            sectionSkeleton.classList.add('hidden');
            sectionLogin.classList.remove('hidden');
            
            if (user) {
                window.location.href = '../index.html';
            }
        });

        // --- MÁSCARAS DE INPUTS ---
        const aplicarMascaraCPF = (v) => {
            v = v.replace(/\D/g, "");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            return v;
        };

        const aplicarMascaraTel = (v) => {
            v = v.replace(/\D/g, "");
            v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
            v = v.replace(/(\d)(\d{4})$/, "$1-$2");
            return v;
        };

        const aplicarMascaraCEP = (v) => {
            v = v.replace(/\D/g, "");
            v = v.replace(/^(\d{5})(\d)/, "$1-$2");
            return v;
        };

        document.getElementById('reg-cpf').oninput = (e) => e.target.value = aplicarMascaraCPF(e.target.value);
        document.getElementById('reg-telefone').oninput = (e) => e.target.value = aplicarMascaraTel(e.target.value);
        document.getElementById('reg-cep').oninput = (e) => e.target.value = aplicarMascaraCEP(e.target.value);

        // --- MOTOR DE CAPTURA DA API VIACEP ---
        document.getElementById('reg-cep').addEventListener('blur', async (e) => {
            const cep = e.target.value.replace(/\D/g, "");
            
            if (cep.length !== 8) {
                if (cep.length > 0) mostrarNotificacao("CEP incompleto. Digite os 8 números.", "error");
                return;
            }

            const inputBairro = document.getElementById('reg-bairro');
            const inputCidade = document.getElementById('reg-cidade');
            const inputEstado = document.getElementById('reg-estado');
            const inputRua = document.getElementById('reg-rua');

            try {
                inputCidade.value = "Buscando...";
                
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const dados = await response.json();

                if (dados.erro) {
                    mostrarNotificacao("CEP não localizado.", "error");
                    inputCidade.value = "";
                    return;
                }

                inputCidade.value = dados.localidade;
                inputEstado.value = dados.uf;

                if (dados.bairro && dados.bairro.trim() !== "") {
                    inputBairro.value = dados.bairro;
                    inputBairro.readOnly = true;
                    inputBairro.classList.add('input-bloqueado');
                } else {
                    inputBairro.value = "";
                    inputBairro.readOnly = false;
                    inputBairro.classList.remove('input-bloqueado');
                    inputBairro.placeholder = "Informe o seu bairro";
                }

                inputRua.value = dados.logradouro || "";
                document.getElementById('reg-numero').focus();

            } catch (err) {
                console.error("Erro ViaCEP:", err);
                mostrarNotificacao("Erro ao consultar serviço postal automático.", "error");
                inputCidade.value = "";
            }
        });

        const validarSenhaForte = (senha) => {
            const regex = /^(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*])(?=.{8,})/;
            return regex.test(senha);
        };

        // Alternância de abas
        document.getElementById('link-ir-cadastro').onclick = (e) => {
            e.preventDefault();
            sectionLogin.classList.add('hidden'); 
            sectionCadastro.classList.remove('hidden'); 
            txtTituloHeader.innerText = "Cadastro"; 
        };

        document.getElementById('btn-voltar-login').onclick = () => {
            sectionCadastro.classList.add('hidden'); 
            sectionLogin.classList.remove('hidden'); 
            txtTituloHeader.innerText = "Login"; 
        };

        // Lógica de Login E-mail/Senha
        document.getElementById('btn-login').onclick = async () => {
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;

            if(!email || !senha) {
                mostrarNotificacao("Preencha todos os campos.", "error");
                return;
            }

            try {
                const btn = document.getElementById('btn-login');
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Entrando...';
                await signInWithEmailAndPassword(auth, email, senha);
                mostrarNotificacao("Bem-vindo de volta!");
                setTimeout(() => window.location.href = '../index.html', 1000);
            } catch (error) {
                document.getElementById('btn-login').innerText = 'Entrar';
                mostrarNotificacao("E-mail ou senha incorretos.", "error");
            }
        };

        // MODIFICADO: Cadastro de Novo Usuário injetando o mapa/objeto puro dentro do array
        document.getElementById('btn-cadastrar-final').onclick = async () => {
            const formInputs = {
                nome: document.getElementById('reg-nome').value.trim(),
                email: document.getElementById('reg-email').value.trim(),
                senha: document.getElementById('reg-senha').value,
                cpfCliente: document.getElementById('reg-cpf').value.trim(),
                telefoneCliente: document.getElementById('reg-telefone').value.trim(),
                
                rua: document.getElementById('reg-rua').value.trim(),
                numero: document.getElementById('reg-numero').value.trim(),
                bairro: document.getElementById('reg-bairro').value.trim(),
                cidade: document.getElementById('reg-cidade').value.trim(),
                estado: document.getElementById('reg-estado').value.trim().toUpperCase(),
                observacao: document.getElementById('reg-obs').value.trim() || "Sem observação",
                cep: document.getElementById('reg-cep').value.trim()
            };

            if(!formInputs.nome || !formInputs.email || !formInputs.senha || !formInputs.cpfCliente || !formInputs.rua || !formInputs.numero || !formInputs.bairro || !formInputs.cep) {
                mostrarNotificacao("Preencha todos os dados obrigatórios, incluindo o endereço completo.", "error");
                return;
            }

            if (!validarSenhaForte(formInputs.senha)) {
                mostrarNotificacao("Senha fraca! Use 8+ caracteres, maiúscula, número e símbolo.", "error");
                return;
            }

            try {
                const btn = document.getElementById('btn-cadastrar-final');
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Criando conta...';
                
                const userCred = await createUserWithEmailAndPassword(auth, formInputs.email, formInputs.senha);
                
                // CORRIGIDO: Monta um mapa/objeto puro estruturado para salvar no banco
                const cidadeEstado = `${formInputs.cidade} - ${formInputs.estado}`;
                const novoEnderecoObj = {
                    id: Date.now().toString(),
                    apelido: "Casa",
                    rua: formInputs.rua,
                    numero: formInputs.numero,
                    bairro: formInputs.bairro,
                    cidade: cidadeEstado,
                    observacao: formInputs.observacao,
                    padrao: true, // Salva o booleano puro (true)
                    cep: formInputs.cep
                };
                
                await setDoc(doc(db, "usuarios", userCred.user.uid), {
                    nome: formInputs.nome,
                    email: formInputs.email,
                    cpfCliente: formInputs.cpfCliente,
                    telefoneCliente: formInputs.telefoneCliente,
                    tipo: "cliente",
                    dataCriacao: new Date(),
                    fotoUrl: "",
                    
                    // CORRIGIDO: Gravando o array populado com o objeto map e não mais a string
                    enderecoCliente: [novoEnderecoObj]
                });

                mostrarNotificacao("Conta criada com sucesso!");
                setTimeout(() => window.location.href = '../index.html', 1500);
            } catch (error) { 
                document.getElementById('btn-cadastrar-final').disabled = false;
                document.getElementById('btn-cadastrar-final').innerText = 'Finalizar Cadastro';
                if(error.code === 'auth/email-already-in-use') {
                    mostrarNotificacao("Este e-mail já está em uso.", "error");
                } else {
                    console.error(error);
                    mostrarNotificacao("Erro ao criar conta.", "error");
                }
            }
        };

        // Esqueci Senha
        document.getElementById('btn-esqueci-senha').onclick = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) { mostrarNotificacao("Informe seu e-mail primeiro.", "error"); return; }
            try {
                await sendPasswordResetEmail(auth, email);
                mostrarNotificacao("E-mail de recuperação enviado!");
            } catch (e) { mostrarNotificacao("Erro ao enviar e-mail.", "error"); }
        };

        // Login com Google
        document.getElementById('btn-google').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                
                if (!userDoc.exists()) {
                    await setDoc(doc(db, "usuarios", user.uid), {
                        nome: user.displayName,
                        email: user.email,
                        tipo: "cliente",
                        fotoUrl: user.photoURL || "",
                        dataCriacao: new Date(),
                        enderecoCliente: []
                    });
                }
                window.location.href = '../index.html';
            } catch (e) { mostrarNotificacao("Falha na autenticação com Google.", "error"); }
        };
    </script>
</body>
</html>
