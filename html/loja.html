<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Loja... | Nordgo Food</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="loja-detalhe">
    <div id="toast-container" class="toast-container"></div>

    <header class="main-header">
        <div class="header-container">
            <div class="header-left">
                <div class="pill-badge pill-back" onclick="history.back()">
                    <img src="../assets/images/voltar.png" alt="Voltar" class="back-icon-img">
                    <span class="location-text">Voltar</span>
                </div>
            </div>
            <div class="header-center">
                <div class="pill-badge pill-page-title">
                    <span id="header-nome-loja" class="header-nome-text">Carregando...</span>
                </div>
            </div>
            <div class="header-right" id="user-area">
                <div style="height: 3rem; min-width: 7.5rem;"></div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="loja-content">
            <section class="loja-hero">
                <div class="loja-banner" id="loja-img-fundo"></div>
                <div class="loja-perfil">
                    <div class="loja-logo-container">
                        <img id="detalhe-logo-loja" 
                             src="../assets/images/default-loja.png" 
                             alt="Logo" 
                             class="loja-logo-circular"
                             onerror="this.src='../assets/images/default-loja.png'">
                    </div>
                    <h1 id="detalhe-nome-loja">Nome da Loja</h1>
                    <p id="detalhe-categoria-loja" class="tag-categoria">Categoria</p>
                    <div class="loja-meta">
                        <span class="meta-item"><i class="fa-solid fa-star"></i> <span id="detalhe-avaliacao">0.0</span></span>
                        <span class="divisor">•</span>
                        <span class="meta-item" id="detalhe-tempo">-- min</span>
                        <span class="divisor">•</span>
                        <span class="meta-item" id="detalhe-frete">---</span>
                    </div>
                    <p id="detalhe-descricao" class="loja-desc"></p>
                </div>
            </section>

            <section class="cardapio-section">
                <div id="container-mais-pedidos" class="hidden">
                    <h2 class="titulo-sessao">Mais Pedidos</h2>
                    <div id="lista-mais-pedidos" class="horizontal-scroll-container"></div>
                </div>
                <div id="cardapio-agrupado"></div>
            </section>
        </div>
    </main>

    <script type="module">
        import { db } from '../js/firebase-config.js';
        import { doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { atualizarCarrinhoFlutuante } from '../js/cart-helper.js';

        const params = new URLSearchParams(window.location.search);
        const lojaId = params.get('loja') || params.get('id'); 
        let nomeLojaGlobal = ""; 
        let fotosCategorias = {}; // Mapa para: { "Nome da Categoria": "arquivo.png" }

        if (!lojaId) { 
            window.location.href = '../index.html'; 
        } else { 
            inicializarPagina(); 
        }

        async function inicializarPagina() {
            try {
                // 1. Mapeia os arquivos de imagem das categorias primeiro
                const catSnap = await getDocs(collection(db, "categorias"));
                catSnap.forEach(docCat => {
                    const c = docCat.data();
                    if (c.nome && c.fotoArquivo) {
                        fotosCategorias[c.nome] = c.fotoArquivo;
                    }
                });

                // 2. Carrega os dados da loja e produtos
                await carregarDadosLoja();
                
                atualizarCarrinhoFlutuante();
            } catch (error) {
                console.error("Erro na inicialização:", error);
            }
        }

        async function carregarDadosLoja() {
            const lojaRef = doc(db, "lojas", lojaId);
            const lojaSnap = await getDoc(lojaRef);
            
            if (!lojaSnap.exists()) { 
                window.location.href = '../index.html'; 
                return; 
            }

            const loja = lojaSnap.data();
            nomeLojaGlobal = loja.nome; 
            renderizarDadosLoja(loja);

            const q = query(collection(db, "produtos"), where("lojaId", "==", lojaId));
            const querySnapshot = await getDocs(q);
            
            const produtos = [];
            querySnapshot.forEach(doc => produtos.push({ id: doc.id, ...doc.data() }));
            renderizarCardapio(produtos);
        }

        function renderizarDadosLoja(loja) {
            document.getElementById('header-nome-loja').innerText = loja.nome;
            document.getElementById('detalhe-nome-loja').innerText = loja.nome; 
            document.getElementById('detalhe-categoria-loja').innerText = loja.categoria;
            document.getElementById('detalhe-descricao').innerText = loja.descricao || "";
            document.getElementById('detalhe-avaliacao').innerText = loja.avaliacao || "Novo";
            document.getElementById('detalhe-tempo').innerText = `${loja.tempoEntrega || '20-30'} min`;
            
            // Prioridade: logoUrl (Upload Storage) > logoLoja (Link antigo)
            document.getElementById('detalhe-logo-loja').src = loja.logoUrl || loja.logoLoja || '../assets/images/default-store.png'; 
            
            const banner = document.getElementById('loja-img-fundo');
            if (loja.bannerLoja) { 
                banner.style.backgroundImage = `url('${loja.bannerLoja}')`; 
            } else { 
                banner.style.backgroundColor = loja.temaLoja || '#ff4757'; 
            }
            
            const freteElem = document.getElementById('detalhe-frete');
            freteElem.innerText = (!loja.frete || loja.frete == 0) 
                ? "Frete Grátis" 
                : parseFloat(loja.frete).toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
        }

        // --- LÓGICA DE SELEÇÃO DE IMAGEM ---
        function obterImagemProduto(p) {
            // 1. Se o produto tem imagem própria, usa ela
            if (p.imagem && p.imagem.trim() !== "") return p.imagem;
            
            // 2. Se não tem, busca o arquivo mapeado na categoria
            const arquivoCat = fotosCategorias[p.categoria];
            if (arquivoCat) return `../assets/images/${arquivoCat}`;
            
            // 3. Fallback final
            return '../assets/images/placeholder.png';
        }

        function criarCardQuadradoHTML(p, customClass = "") {
            const indisponivel = p.disponibilidade === false;
            const imgUrl = obterImagemProduto(p);

            return `
                <div class="card-produto-quadrado ${customClass} ${indisponivel ? 'prod-esgotado' : ''}">
                    <img src="${imgUrl}" 
                         alt="${p.nome}"
                         onerror="this.src='../assets/images/placeholder.png'">
                    ${indisponivel ? '<span class="badge-esgotado">Esgotado</span>' : ''}
                    <div class="info-overlay">
                        <h3>${p.nome}</h3>
                        <span class="preco-tag">R$ ${p.preco.toLocaleString('pt-br', {minimumFractionDigits: 2})}</span>
                    </div>
                    ${!indisponivel ? `
                        <button class="btn-add-carrinho" onclick="adicionarAoCarrinho('${p.id}', '${p.nome}', ${p.preco}, '${imgUrl}', '${lojaId}', '${nomeLojaGlobal}')">
                            <i class="fa-solid fa-plus"></i><i class="fa-solid fa-cart-shopping"></i>
                        </button>` : ''}
                </div>
            `;
        }

        function criarCardHorizontalHTML(p) {
            const indisponivel = p.disponibilidade === false;
            const imgUrl = obterImagemProduto(p);

            return `
                <div class="card-produto-horizontal ${indisponivel ? 'prod-esgotado' : ''}">
                    <div class="prod-foto-lateral">
                        <img src="${imgUrl}" 
                             alt="${p.nome}"
                             onerror="this.src='../assets/images/placeholder.png'">
                    </div>
                    <div class="prod-conteudo">
                        <div class="prod-textos">
                            <div class="prod-header-info">
                                <h4>${p.nome}</h4>
                                <span class="status-badge ${indisponivel ? 'status-indisponivel' : 'status-disponivel'}">
                                    <i class="fa-solid ${indisponivel ? 'fa-circle-xmark' : 'fa-circle-check'}"></i> 
                                    ${indisponivel ? 'Indisponível' : 'Disponível'}
                                </span>
                            </div>
                            <p class="prod-desc-completa">${p.descricao || 'Nenhuma descrição disponível.'}</p>
                        </div>
                        <div class="prod-acoes-lateral">
                            <span class="preco-detalhe">R$ ${p.preco.toLocaleString('pt-br', {minimumFractionDigits: 2})}</span>
                            ${!indisponivel ? `
                                <button class="btn-add-carrinho" onclick="adicionarAoCarrinho('${p.id}', '${p.nome}', ${p.preco}, '${imgUrl}', '${lojaId}', '${nomeLojaGlobal}')">
                                    <i class="fa-solid fa-plus"></i><i class="fa-solid fa-cart-shopping"></i>
                                </button>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderizarCardapio(produtos) {
            const containerMaisPedidos = document.getElementById('container-mais-pedidos');
            const listaMaisPedidos = document.getElementById('lista-mais-pedidos');
            const cardapioAgrupado = document.getElementById('cardapio-agrupado');
            
            listaMaisPedidos.innerHTML = ""; 
            cardapioAgrupado.innerHTML = "";

            const maisPedidos = produtos.filter(p => p.destaque === true);
            if (maisPedidos.length > 0) {
                containerMaisPedidos.classList.remove('hidden');
                maisPedidos.forEach(p => { listaMaisPedidos.innerHTML += criarCardQuadradoHTML(p, "scroll-item"); });
            }

            const categoriasEncontradas = {};
            produtos.forEach(p => {
                const cat = p.categoria || "Outros";
                if (!categoriasEncontradas[cat]) categoriasEncontradas[cat] = [];
                categoriasEncontradas[cat].push(p);
            });

            Object.keys(categoriasEncontradas).sort().forEach(catNome => {
                const produtosDaCat = categoriasEncontradas[catNome].sort((a, b) => a.nome.localeCompare(b.nome));
                let htmlCategoria = `
                    <div class="categoria-bloco">
                        <h2 class="titulo-categoria">${catNome}</h2>
                        <div class="grid-produtos-detalhado">`;
                
                produtosDaCat.forEach(p => { htmlCategoria += criarCardHorizontalHTML(p); });
                
                htmlCategoria += `</div></div>`;
                cardapioAgrupado.innerHTML += htmlCategoria;
            });
        }
    </script>
</body>
</html>
