<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | Nordgo Food</title>
    <!-- O estilo vem exclusivamente daqui -->
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <!-- Esquerda: Botão Voltar -->
            <div class="header-left">
                <button onclick="window.location.href='../index.html'" class="btn-back">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>Voltar</span>
                </button>
            </div>

            <!-- Centro: Logo -->
            <div class="header-center">
                <img src="../assets/images/nordgo-logo.png" alt="NordGo Food" class="main-logo" onclick="window.location.href='../index.html'">
            </div>

            <!-- Direita: Área do Usuário (Preenchida pelo app.js) -->
            <div class="header-right">
                <!-- O app.js injetará o menu aqui -->
            </div>
        </div>
    </header>

    <main class="container">
        <div class="login-container">
            <header class="login-header">
                <h2>Meu Perfil</h2>
                <p>Gerencie suas informações pessoais e de entrega</p>
            </header>

            <div class="perfil-info">
                <div class="perfil-foto-wrapper">
                    <img id="perfil-foto" src="https://via.placeholder.com/100" alt="Foto do perfil">
                </div>

                <div class="login-form">
                    <!-- Informações Básicas -->
                    <label for="perfil-nome">Nome Completo</label>
                    <input type="text" id="perfil-nome" placeholder="Seu nome">

                    <label for="perfil-email">E-mail (Login)</label>
                    <input type="email" id="perfil-email" readonly>

                    <label for="perfil-telefone">Telefone / WhatsApp</label>
                    <input type="text" id="perfil-telefone" placeholder="(00) 00000-0000">

                    <!-- Endereço (Nomes conforme imagem_95f6fe.png) -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="perfil-cep">CEP</label>
                            <input type="text" id="perfil-cep" placeholder="00000-000">
                        </div>
                        <div class="form-group">
                            <label for="perfil-bairro">Bairro</label>
                            <input type="text" id="perfil-bairro" placeholder="Seu bairro">
                        </div>
                    </div>

                    <label for="perfil-rua">Rua / Avenida</label>
                    <input type="text" id="perfil-rua" placeholder="Ex: Rua Ada Zenaide da Silva">

                    <div class="form-row">
                        <div class="form-group">
                            <label for="perfil-numero">Número</label>
                            <input type="text" id="perfil-numero" placeholder="Ex: 44">
                        </div>
                        <div class="form-group">
                            <label for="perfil-obs">Complemento / Obs</label>
                            <input type="text" id="perfil-obs" placeholder="Apto, bloco, etc.">
                        </div>
                    </div>

                    <!-- Botões de Ação -->
                    <button id="btn-salvar-perfil" class="btn-principal">
                        Salvar Alterações
                    </button>
                    
                    <button id="btn-logout" class="btn-principal btn-secundario">
                        Sair da Conta
                    </button>

                    <button id="btn-deletar-conta" class="btn-principal btn-perigo" style="margin-top: 2rem;">
                        Excluir Minha Conta
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="../js/app.js"></script>
</body>
</html>
