<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | Nordgo Food</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/style-perfil.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>

    <header class="main-header">
        <div class="header-container">
            <div class="header-left">
                <div class="pill-badge pill-back" onclick="window.location.href='../index.html'" style="cursor: pointer;">
                    <img src="../assets/images/voltar.png" alt="Voltar" class="back-icon-img">
                    <span class="location-text" style="margin-left: 1rem;">Voltar</span>
                </div>
            </div>

            <div class="header-center">
                <div class="pill-badge pill-page-title" style="cursor: default; background-color: #f5f5f5; border-color: #e2e2e2;">
                    <span style="font-weight: 600; color: #333;">Meu Perfil</span>
                </div>
            </div>

            <div class="header-right" id="user-area">
                <div class="user-loading-placeholder" style="height: 3rem; min-width: 120px;"></div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="login-container profile-page">
            <header class="login-header">
                <h2>Dados da Conta</h2>
                <p>Gerencie suas informações de cliente</p>
            </header>

            <div class="perfil-info" id="perfil-form-container">
                <div class="login-form">
                    
                    <div class="perfil-foto-container">
                        <label for="input-foto-perfil" class="wrapper-foto">
                            <img id="foto-perfil-display" src="../assets/images/default-user.png" alt="Sua Foto" class="foto-perfil-edit">
                            <div class="overlay-upload"><i class="fa-solid fa-camera"></i></div>
                        </label>
                        <input type="file" id="input-foto-perfil" class="input-file-hidden" accept="image/*">
                        <p class="instrucao-upload">Clique para alterar foto</p>
                    </div>

                    <div class="form-section">
                        <h3><i class="fa-regular fa-id-card"></i> Identificação</h3>
                        
                        <label for="perfil-nome">Nome Completo</label>
                        <input type="text" id="perfil-nome" placeholder="Seu nome">

                        <label for="perfil-email">E-mail</label>
                        <input type="email" id="perfil-email" readonly style="background: #eee; cursor: not-allowed;">

                        <div class="form-row">
                            <div class="form-group">
                                <label for="perfil-cpf">CPF</label>
                                <input type="text" id="perfil-cpf" placeholder="000.000.000-00" maxlength="14">
                            </div>
                            <div class="form-group">
                                <label for="perfil-telefone">Telefone</label>
                                <input type="text" id="perfil-telefone" placeholder="(00) 00000-0000" maxlength="15">
                            </div>
                        </div>
                    </div>

                    <div class="form-section" style="margin-top: 20px;">
                        <h3><i class="fa-solid fa-location-dot"></i> Endereço de Entrega</h3>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="perfil-cep">CEP</label>
                                <input type="text" id="perfil-cep" placeholder="00000-000" maxlength="9">
                            </div>
                            <div class="form-group">
                                <label for="perfil-bairro">Bairro</label>
                                <input type="text" id="perfil-bairro" placeholder="Ex: Centro">
                            </div>
                        </div>

                        <label for="perfil-rua">Rua / Avenida</label>
                        <input type="text" id="perfil-rua" placeholder="Ex: Rua José Maria">

                        <div class="form-row">
                            <div class="form-group">
                                <label for="perfil-numero">Número</label>
                                <input type="text" id="perfil-numero" placeholder="Ex: 1337">
                            </div>
                            <div class="form-group">
                                <label for="perfil-obs">Complemento</label>
                                <input type="text" id="perfil-obs" placeholder="Ex: casa de esquina">
                            </div>
                        </div>
                    </div>

                    <div class="action-buttons" style="margin-top: 30px;">
                        <button id="btn-salvar-perfil" class="btn-principal">
                            <i class="fa-solid fa-floppy-disk"></i> Salvar Alterações
                        </button>
                        <button id="btn-logout" class="btn-secundario">
                            <i class="fa-solid fa-right-from-bracket"></i> Sair
                        </button>
                        <hr style="margin: 20px 0; opacity: 0.2;">
                        <button id="btn-deletar-conta" class="btn-perigo">
                            <i class="fa-solid fa-trash-can"></i> Excluir Conta
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, db, storage, mostrarNotificacao } from '../js/firebase-config.js';
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-storage.js";
        import { doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut, deleteUser } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const campos = {
            nome: document.getElementById('perfil-nome'),
            email: document.getElementById('perfil-email'),
            cpf: document.getElementById('perfil-cpf'),
            telefone: document.getElementById('perfil-telefone'),
            cep: document.getElementById('perfil-cep'),
            bairro: document.getElementById('perfil-bairro'),
            rua: document.getElementById('perfil-rua'),
            numero: document.getElementById('perfil-numero'),
            obs: document.getElementById('perfil-obs'),
            fotoDisplay: document.getElementById('foto-perfil-display'),
            fotoInput: document.getElementById('input-foto-perfil')
        };

        const aplicarMascaraCPF = (valor) => {
            return valor.replace(/\D/g, '').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})/, '$1-$2').replace(/(-\d{2})\d+?$/, '$1');
        };

        const aplicarMascaraTelefone = (valor) => {
            return valor.replace(/\D/g, '').replace(/(\d{2})(\d)/, '($1) $2').replace(/(\d{5})(\d)/, '$1-$2').replace(/(-\d{4})\d+?$/, '$1');
        };

        campos.cpf.addEventListener('input', (e) => e.target.value = aplicarMascaraCPF(e.target.value));
        campos.telefone.addEventListener('input', (e) => e.target.value = aplicarMascaraTelefone(e.target.value));

        campos.fotoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => campos.fotoDisplay.src = event.target.result;
                reader.readAsDataURL(file);
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userSnap = await getDoc(doc(db, "usuarios", user.uid));
                    if (userSnap.exists()) {
                        const d = userSnap.data();
                        campos.nome.value = d.nome || "";
                        campos.email.value = d.email || user.email;
                        campos.cpf.value = aplicarMascaraCPF(d.cpfCliente || "");
                        campos.telefone.value = aplicarMascaraTelefone(d.telefoneCliente || "");
                        campos.cep.value = d.cepCliente || "";
                        campos.bairro.value = d.bairroCliente || "";
                        campos.rua.value = d.ruaCliente || "";
                        campos.numero.value = d.nCliente || "";
                        campos.obs.value = d.observacaoCliente || "";
                        if (d.fotoUrl) campos.fotoDisplay.src = d.fotoUrl;
                    }
                } catch (e) { console.error(e); }
            } else { window.location.href = "login.html"; }
        });

        document.getElementById('btn-salvar-perfil').onclick = async () => {
            const user = auth.currentUser;
            if (!user) return;
            const btn = document.getElementById('btn-salvar-perfil');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Salvando...';
            try {
                const arquivo = campos.fotoInput.files[0];
                let urlFotoFinal = campos.fotoDisplay.src;
                if (arquivo) {
                    mostrarNotificacao("Enviando foto...", "info");
                    const storageRef = ref(storage, `usuarios/${user.uid}/perfil_${Date.now()}`);
                    await uploadBytes(storageRef, arquivo);
                    urlFotoFinal = await getDownloadURL(storageRef);
                }
                await updateDoc(doc(db, "usuarios", user.uid), {
                    nome: campos.nome.value,
                    cpfCliente: campos.cpf.value,
                    telefoneCliente: campos.telefone.value,
                    cepCliente: campos.cep.value,
                    bairroCliente: campos.bairro.value,
                    ruaCliente: campos.rua.value,
                    nCliente: campos.numero.value,
                    observacaoCliente: campos.obs.value,
                    fotoUrl: urlFotoFinal
                });
                mostrarNotificacao("Perfil atualizado!");
                setTimeout(() => location.reload(), 1000);
            } catch (e) { mostrarNotificacao("Erro ao salvar.", "error"); }
            finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Salvar Alterações'; }
        };

        document.getElementById('btn-logout').onclick = async () => {
            if(confirm("Deseja sair?")) { await signOut(auth); window.location.href = "../index.html"; }
        };

        document.getElementById('btn-deletar-conta').onclick = async () => {
            const user = auth.currentUser;
            if(confirm("Excluir conta permanentemente?")) {
                try {
                    await deleteDoc(doc(db, "usuarios", user.uid));
                    await deleteUser(user);
                    window.location.href = "../index.html";
                } catch (e) { mostrarNotificacao("Erro: Faça login novamente.", "error"); }
            }
        };
    </script>
</body>
</html>
