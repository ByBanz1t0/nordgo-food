<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa | NordGo</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    
    <header class="main-header">
        <div class="header-container">
            <div class="header-left">
                <div class="pill-badge pill-back" onclick="history.back()">
                    <img src="../assets/images/voltar.png" alt="Voltar" class="back-icon-img">
                    <span class="location-text">Voltar</span>
                </div>
            </div>

            <div class="header-center">
                <div class="search-bar-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="input-busca" placeholder="Busque por um estabelecimento...">
                </div>
            </div>

            <div id="user-area" class="header-right">
                <div class="pill-badge" style="opacity: 0.5;">
                    <span class="user-name-text">Carregando...</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="search-info">
            <h2 id="titulo-pesquisa" class="section-title">Resultados da busca</h2>
            <p id="subtitulo-pesquisa">Buscando o melhor de Arapiraca para você...</p>
        </div>

        <div id="lista-resultados"></div>
    </main>

    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/cart-helper.js"></script>

    <script type="module">
        import { auth, db, mostrarNotificacao } from '../js/firebase-config.js';
        // MODIFICADO: Adicionado 'query' e 'where' para realizar os filtros de segurança
        import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { atualizarCarrinhoFlutuante } from '../js/cart-helper.js';

        const params = new URLSearchParams(window.location.search);
        const categoriaFiltro = params.get('categoria');
        const termoBusca = params.get('busca');

        const listaResultados = document.getElementById('lista-resultados');
        const titulo = document.getElementById('titulo-pesquisa');
        const subtitulo = document.getElementById('subtitulo-pesquisa');

        const inputBusca = document.getElementById('input-busca');
        inputBusca.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && inputBusca.value.trim() !== "") {
                window.location.href = `pesquisa.html?busca=${encodeURIComponent(inputBusca.value.trim())}`;
            }
        });

        async function executarBusca() {
            atualizarCarrinhoFlutuante();
            try {
                // CORREÇÃO: Filtra as lojas direto no banco para trazer apenas as aprovadas
                const qLojasAtivas = query(collection(db, "lojas"), where("status", "==", "aprovado"));

                const [snapshotLojas, snapshotProdutos] = await Promise.all([
                    getDocs(qLojasAtivas),
                    getDocs(collection(db, "produtos"))
                ]);

                let lojas = [];
                let produtos = [];

                // Alimenta o array de lojas ativas
                snapshotLojas.forEach(doc => lojas.push({ id: doc.id, ...doc.data(), tipo: 'loja' }));

                // O PULO DO GATO: Cria um Set com os IDs das lojas que estão ativas/aprovadas
                const lojasAprovadasIds = new Set(lojas.map(l => l.id));

                // Varre os produtos e barra aqueles cujas lojas estão suspensas ou pendentes
                snapshotProdutos.forEach(doc => {
                    const dadosProduto = doc.data();
                    if (lojasAprovadasIds.has(dadosProduto.lojaId)) {
                        produtos.push({ id: doc.id, ...dadosProduto, tipo: 'produto' });
                    }
                });

                const catUrl = categoriaFiltro ? categoriaFiltro.toLowerCase() : null;
                const buscaUrl = termoBusca ? termoBusca.toLowerCase() : null;

                let resultadosFinais = [];

                if (catUrl) {
                    titulo.innerText = `Categoria: ${categoriaFiltro}`;
                    resultadosFinais = [
                        ...lojas.filter(l => (l.categoria || "").toLowerCase().includes(catUrl)),
                        ...produtos.filter(p => (p.categoria || "").toLowerCase().includes(catUrl))
                    ];
                } else if (buscaUrl) {
                    titulo.innerText = `Buscando por: "${termoBusca}"`;
                    inputBusca.value = termoBusca;
                    resultadosFinais = [
                        ...lojas.filter(l => (l.nome || "").toLowerCase().includes(buscaUrl) || (l.categoria || "").toLowerCase().includes(buscaUrl)),
                        ...produtos.filter(p => (p.nome || "").toLowerCase().includes(buscaUrl) || (p.categoria || "").toLowerCase().includes(buscaUrl))
                    ];
                }
                renderizarResultados(resultadosFinais);
            } catch (e) {
                console.error("Erro na busca:", e);
                listaResultados.innerHTML = "<p>Erro ao processar busca.</p>";
            }
        }

        function renderizarResultados(resultados) {
            listaResultados.innerHTML = "";
            if (resultados.length === 0) {
                listaResultados.innerHTML = "<p class='placeholder-text'>Nenhum resultado encontrado.</p>";
                subtitulo.innerText = "Tente outros termos.";
                return;
            }

            const lojasOrdenadas = resultados.filter(item => item.tipo === 'loja');
            const produtosOrdenadas = resultados.filter(item => item.tipo === 'produto');

            // --- SEÇÃO DE LOJAS ---
            if (lojasOrdenadas.length > 0) {
                const secaoLojas = document.createElement('div');
                secaoLojas.innerHTML = `<h3 class="section-divider">Lojas encontradas</h3>`;
                const scrollContainer = document.createElement('div');
                scrollContainer.className = 'horizontal-scroll-container';
                
                lojasOrdenadas.forEach(item => {
                    const logoUrl = (item.logoLoja && item.logoLoja.trim() !== "") 
                                    ? item.logoLoja 
                                    : '../assets/images/default-loja.png';

                    scrollContainer.innerHTML += `
                        <div class="card-loja scroll-item" onclick="window.location.href='loja.html?loja=${item.id}'">
                            <div class="banner-loja" style="background-color: ${item.temaLoja || '#ff6400'}">
                                <img src="${logoUrl}" class="logo-loja" alt="${item.nome}">
                            </div>
                            <div class="info-loja">
                                <h3>${item.nome}</h3>
                                <p><i class="fa-solid fa-star" style="color: #ffa502;"></i> ${item.avaliacao || '4.5'} • ${item.categoria}</p>
                            </div>
                        </div>`;
                });
                secaoLojas.appendChild(scrollContainer);
                listaResultados.appendChild(secaoLojas);
            }

            // --- SEÇÃO DE PRODUTOS ---
            if (produtosOrdenadas.length > 0) {
                const secaoProdutos = document.createElement('div');
                secaoProdutos.innerHTML = `<h3 class="section-divider">Produtos encontrados</h3>`;
                const gridProdutos = document.createElement('div');
                gridProdutos.className = 'grid-lojas';
                
                produtosOrdenadas.forEach(item => {
                    let imagemUrl = (item.imagem && item.imagem.trim() !== "") ? item.imagem : null;
                    
                    if (!imagemUrl) {
                        if (item.categoria === "Doces & Bolos" || item.slugCategoria === "doces") {
                            imagemUrl = '../assets/images/default-doces.png'; 
                        } else {
                            imagemUrl = '../assets/images/placeholder.png';
                        }
                    }

                    const card = document.createElement('div');
                    card.className = 'card-loja produto-encontrado';
                    card.innerHTML = `
                        <div class="banner-loja" onclick="window.location.href='loja.html?loja=${item.lojaId}'">
                            <img src="${imagemUrl}" class="logo-loja" alt="${item.nome}">
                        </div>
                        <div class="info-loja">
                            <h3 onclick="window.location.href='loja.html?loja=${item.lojaId}'">${item.nome} <span class="badge-tipo prod">Produto</span></h3>
                            <p>${item.categoria} • <span class="preco-busca">R$ ${item.preco.toLocaleString('pt-br', {minimumFractionDigits: 2})}</span></p>
                            <button class="btn-add-carrinho" onclick="adicionarAoCarrinho('${item.id}', '${item.nome}', ${item.preco}, '${imagemUrl}', '${item.lojaId}')">
                                <i class="fa-solid fa-plus"></i><i class="fa-solid fa-cart-shopping"></i>
                            </button>
                        </div>`;
                    gridProdutos.appendChild(card);
                });
                secaoProdutos.appendChild(gridProdutos);
                listaResultados.appendChild(secaoProdutos);
            }
            subtitulo.innerText = `Encontramos ${lojasOrdenadas.length} lojas e ${produtosOrdenadas.length} produtos.`;
        }

        executarBusca();
    </script>
</body>
</html>
