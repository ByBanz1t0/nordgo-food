<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NordGo | Pesquisa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    
    <header class="main-header">
        <div class="header-container">
            <div class="header-left">
                <a href="../index.html">
                    <img src="../assets/images/nordgo-logo.png" alt="NordGo" class="main-logo">
                </a>
            </div>
            <div class="header-center">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="input-busca-interna" placeholder="Pesquisar lojas ou produtos...">
                </div>
            </div>
            <div class="header-right" id="user-area"></div>
        </div>
    </header>

    <main class="container">
        <div class="search-info">
            <h2 id="titulo-pesquisa" class="section-title">Resultados da busca</h2>
            <p id="subtitulo-pesquisa">Buscando o melhor de Arapiraca para você...</p>
        </div>

        <div id="lista-resultados" class="grid-lojas">
            <!-- Conteúdo dinâmico via JS -->
        </div>
    </main>

    <script type="module">
        import { auth, db } from '../js/firebase-config.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const params = new URLSearchParams(window.location.search);
        const categoriaFiltro = params.get('categoria');
        const termoBusca = params.get('busca');

        const listaResultados = document.getElementById('lista-resultados');
        const titulo = document.getElementById('titulo-pesquisa');
        const subtitulo = document.getElementById('subtitulo-pesquisa');

        function injetarSkeletons() {
            listaResultados.innerHTML = Array(4).fill(`
                <div class="skeleton-card">
                    <div class="skeleton skeleton-banner"></div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text-sm"></div>
                </div>
            `).join('');
        }

        const inputInterno = document.getElementById('input-busca-interna');
        inputInterno.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && inputInterno.value.trim() !== "") {
                window.location.href = `pesquisa.html?busca=${encodeURIComponent(inputInterno.value.trim())}`;
            }
        });

        async function executarBusca() {
            injetarSkeletons();
            
            try {
                // Busca paralela em lojas e produtos (agora na raiz)
                const [snapshotLojas, snapshotProdutos] = await Promise.all([
                    getDocs(collection(db, "lojas")),
                    getDocs(collection(db, "produtos"))
                ]);

                let lojas = [];
                let produtos = [];

                snapshotLojas.forEach(doc => lojas.push({ id: doc.id, ...doc.data(), tipo: 'loja' }));
                snapshotProdutos.forEach(doc => produtos.push({ id: doc.id, ...doc.data(), tipo: 'produto' }));

                const catUrl = categoriaFiltro ? categoriaFiltro.toLowerCase() : null;
                const buscaUrl = termoBusca ? termoBusca.toLowerCase() : null;

                let resultadosFinais = [];

                if (catUrl) {
                    titulo.innerText = `Categoria: ${categoriaFiltro}`;
                    const lFiltradas = lojas.filter(l => (l.categoria || "").toLowerCase().includes(catUrl));
                    const pFiltrados = produtos.filter(p => (p.categoria || "").toLowerCase().includes(catUrl));
                    resultadosFinais = [...lFiltradas, ...pFiltrados];
                } else if (buscaUrl) {
                    titulo.innerText = `Buscando por: "${termoBusca}"`;
                    const lFiltradas = lojas.filter(l => 
                        (l.nome || "").toLowerCase().includes(buscaUrl) || 
                        (l.categoria || "").toLowerCase().includes(buscaUrl)
                    );
                    const pFiltrados = produtos.filter(p => 
                        (p.nome || "").toLowerCase().includes(buscaUrl) || 
                        (p.categoria || "").toLowerCase().includes(buscaUrl)
                    );
                    resultadosFinais = [...lFiltradas, ...pFiltrados];
                }

                renderizarResultados(resultadosFinais);

            } catch (e) {
                console.error("Erro na busca:", e);
                listaResultados.innerHTML = "<p>Erro ao processar busca.</p>";
            }
        }

        function renderizarResultados(resultados) {
            listaResultados.innerHTML = "";
            
            if (resultados.length === 0) {
                listaResultados.innerHTML = "<p class='placeholder-text'>Nenhum resultado encontrado.</p>";
                subtitulo.innerText = "Tente outros termos.";
                return;
            }

            subtitulo.innerText = `Encontramos ${resultados.length} resultados.`;

            resultados.forEach(item => {
                if (item.tipo === 'loja') {
                    listaResultados.innerHTML += `
                        <div class="card-loja" onclick="window.location.href='loja.html?loja=${item.id}'">
                            <div class="banner-loja" style="background-color: ${item.temaLoja || '#ff4757'}">
                                <img src="${item.logoLoja || '../assets/images/default-store.png'}" class="logo-loja">
                            </div>
                            <div class="info-loja">
                                <h3>${item.nome} <span class="badge-tipo">Loja</span></h3>
                                <p>${item.categoria} • ${item.bairroLoja || 'Arapiraca'}</p>
                            </div>
                        </div>`;
                } else {
                    listaResultados.innerHTML += `
                        <div class="card-loja produto-encontrado" onclick="window.location.href='loja.html?loja=${item.lojaId}'">
                            <div class="banner-loja">
                                <img src="${item.imagem || '../assets/images/placeholder.png'}" class="logo-loja">
                            </div>
                            <div class="info-loja">
                                <h3>${item.nome} <span class="badge-tipo prod">Produto</span></h3>
                                <p>${item.categoria} • <span class="preco-busca">R$ ${item.preco.toLocaleString('pt-br', {minimumFractionDigits: 2})}</span></p>
                                <small>Ver na loja <i class="fa-solid fa-chevron-right"></i></small>
                            </div>
                        </div>`;
                }
            });
        }

        executarBusca();
    </script>
</body>
</html>
