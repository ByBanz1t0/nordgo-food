<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NordGo | Sua Vitrine de Sabores</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            
            <div class="header-left">
                <a href="index.html">
                    <img src="assets/images/nordgo-logo.png" alt="NordGo" class="main-logo">
                </a>
            </div>

            <div class="header-center">
                <div class="search-bar">
                    <input type="text" placeholder="Busque por um restaurante...">
                </div>
            </div>

            <!-- O app.js vai preencher esta div automaticamente baseado no login -->
            <div class="header-right">
                <div class="user-menu">
                    <span class="user-name">Carregando...</span>
                </div>
            </div>

        </div>
    </header>

    <section class="hero">
        <h2>Os melhores restaurantes em um só lugar</h2>
        <p>Escolha, peça e aproveite.</p>
    </section>

    <main class="container">
        <!-- O app.js vai renderizar os cards aqui dentro -->
        <div id="lista-restaurantes" class="grid-restaurantes">
            <div class="loading">Carregando restaurantes...</div>
        </div>
    </main>

    <!-- ATUALIZADO: Agora aponta para o arquivo unificado app.js -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
