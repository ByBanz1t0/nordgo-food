<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NordGo | Sua Vitrine de Sabores</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- O link abaixo carregará o CSS que você vai me enviar -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    
    <header class="main-header">
        <div class="header-container">
            <!-- LOGO E LOCALIZAÇÃO -->
            <div class="header-left">
                <div class="pill-badge pill-home">
                    <a href="index.html" class="logo-link">
                        <img src="assets/images/nordgo-logo.png" alt="NordGo" class="main-logo">
                    </a>
                    <span class="location-text">Home</span>
                </div>
            </div>

            <!-- BARRA DE PESQUISA -->
            <div class="header-center">
                <div class="search-bar-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="input-busca" placeholder="Busque por um estabelecimento...">
                </div>
            </div>

            <!-- ÁREA DO USUÁRIO -->
            <div class="header-right" id="user-area">
                <div class="pill-badge pill-user">
                    <div class="user-photo-placeholder">
                        <i class="fa-solid fa-user"></i>
                        <img id="user-photo" src="" alt="" class="hidden">
                    </div>
                    <span id="user-name">Carregando...</span>
                </div>
            </div>
        </div>
    </header>

    <section class="hero">
        <h2>Os melhores estabelecimentos em um só lugar</h2>
        <p>Escolha, peça e aproveite.</p>
    </section>

    <main class="container">
        <!-- Slider de Categorias -->
        <div id="categorias-container" class="categorias-slider"></div>

        <h2 class="section-title">Explorar Lojas</h2>
        <div id="lista-lojas" class="grid-lojas"></div>
    </main>

    <!-- CARRINHO FLUTUANTE -->
    <div id="floating-cart" class="carrinho-flutuante hidden" onclick="window.location.href='html/carrinho.html'">
        <div class="carrinho-info-esquerda">
            <span id="cart-count" class="badge-qtd-carrinho">0</span>
            <span class="carrinho-texto">Ver Carrinho</span>
        </div>
        <div class="carrinho-info-direita">
            <span id="cart-float-total" class="carrinho-valor-total">R$ 0,00</span>
            <i class="fa-solid fa-chevron-right" style="margin-left: 10px; font-size: 0.8rem;"></i>
        </div>
    </div>

    <!-- Scripts do Firebase e Lógica de Negócio -->
    <script type="module" src="./js/firebase-config.js"></script>
    <script type="module" src="./js/cart-helper.js"></script>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { collection, getDocs, doc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { atualizarCarrinhoFlutuante } from './js/cart-helper.js';

        let bairroUsuario = "";

        // --- FUNÇÃO PARA GERAR SKELETONS ---
        function injetarSkeletons() {
            const catContainer = document.getElementById('categorias-container');
            const lojasContainer = document.getElementById('lista-lojas');
            catContainer.innerHTML = Array(6).fill('<div class="skeleton skeleton-cat"></div>').join('');
            lojasContainer.innerHTML = Array(4).fill(`
                <div class="skeleton-card">
                    <div class="skeleton skeleton-banner"></div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text-sm"></div>
                </div>
            `).join('');
        }

        // --- LÓGICA DA BARRA DE BUSCA ---
        const inputBusca = document.getElementById('input-busca');
        inputBusca.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const valor = inputBusca.value.trim();
                if (valor !== "") {
                    window.location.href = `html/pesquisa.html?busca=${encodeURIComponent(valor)}`;
                }
            }
        });

        // Inicialização
        injetarSkeletons();
        atualizarCarrinhoFlutuante();

        onAuthStateChanged(auth, async (user) => {
            const userNameElem = document.getElementById('user-name');
            const userPhotoElem = document.getElementById('user-photo');

            if (user) {
                try {
                    const userSnap = await getDoc(doc(db, "usuarios", user.uid));
                    if (userSnap.exists()) {
                        const dados = userSnap.data();
                        bairroUsuario = dados.bairro || dados.bairroCliente || "";
                        
                        // Atualiza a pílula do usuário
                        userNameElem.innerText = `Olá, ${dados.nome.split(' ')[0]}`;
                        if (dados.fotoUrl) {
                            userPhotoElem.src = dados.fotoUrl;
                            userPhotoElem.classList.remove('hidden');
                            userPhotoElem.previousElementSibling.classList.add('hidden');
                        }
                    }
                } catch (e) {
                    console.error("Erro ao obter dados do usuário:", e);
                }
            } else {
                userNameElem.innerText = "Entrar";
            }
            renderizarCategorias();
            renderizarLojas();
        });

        async function renderizarCategorias() {
            const container = document.getElementById('categorias-container');
            try {
                const q = query(collection(db, "categorias"), orderBy("nome", "asc"));
                const querySnapshot = await getDocs(q);
                container.innerHTML = ""; 

                querySnapshot.forEach((doc) => {
                    const cat = doc.data();
                    const div = document.createElement('div');
                    div.className = 'cat-item';
                    div.innerText = cat.nome;
                    div.onclick = () => {
                        const termo = cat.slug || cat.nome;
                        window.location.href = `html/pesquisa.html?categoria=${encodeURIComponent(termo)}`;
                    };
                    container.appendChild(div);
                });
            } catch (e) { 
                container.innerHTML = "Erro ao carregar categorias.";
            }
        }

        async function renderizarLojas() {
            const lista = document.getElementById('lista-lojas');
            try {
                const querySnapshot = await getDocs(collection(db, "lojas"));
                lista.innerHTML = ""; 

                let lojas = [];
                querySnapshot.forEach(doc => lojas.push({ id: doc.id, ...doc.data() }));

                lojas.sort((a, b) => {
                    const aPerto = a.bairroLoja?.trim().toLowerCase() === bairroUsuario?.trim().toLowerCase() && bairroUsuario !== "" ? 1 : 0;
                    const bPerto = b.bairroLoja?.trim().toLowerCase() === bairroUsuario?.trim().toLowerCase() && bairroUsuario !== "" ? 1 : 0;
                    return bPerto - aPerto;
                });

                lojas.forEach(d => {
                    const eDoBairro = d.bairroLoja?.trim().toLowerCase() === bairroUsuario?.trim().toLowerCase() && bairroUsuario !== "";
                    lista.innerHTML += `
                        <div class="card-loja" onclick="window.location.href='html/loja.html?loja=${d.id}'">
                            <div class="banner-loja" style="background-color: ${d.temaLoja || '#ff4757'}">
                                <img src="${d.logoLoja || 'assets/images/default-loja.png'}" class="logo-loja" alt="Logo">
                            </div>
                            <div class="info-loja">
                                <h3>${d.nome} ${eDoBairro ? '<span class="badge-proximo">Perto</span>' : ''}</h3>
                                <p>${d.categoria} • ${d.bairroLoja || 'Centro'}</p>
                            </div>
                        </div>`;
                });

                if (lojas.length === 0) lista.innerHTML = "<p>Nenhuma loja encontrada.</p>";
            } catch (e) { 
                lista.innerHTML = "<p>Erro ao carregar lojas.</p>";
            }
        }
    </script>
</body>
</html>
