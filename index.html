<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NordGo | Sua Vitrine de Sabores</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    
    <header class="main-header">
        <div class="header-container">
            <div class="header-left">
                <div class="pill-badge pill-home" onclick="window.location.href='index.html'">
                    <img src="assets/images/nordgo-logo.png" alt="NordGo" class="main-logo">
                    <span class="location-text">Home</span>
                </div>
            </div>

            <div class="header-center">
                <div class="search-bar-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="input-busca" placeholder="Busque por um estabelecimento...">
                </div>
            </div>

            <div class="header-right" id="user-area">
                <div class="pill-badge" style="opacity: 0.5;">
                    <span class="user-name-text">Carregando...</span>
                </div>
            </div>
        </div>
    </header>

    <section class="hero">
        <h2>Os melhores estabelecimentos em um só lugar</h2>
        <p>Escolha, peça e aproveite.</p>
    </section>

    <main class="container">
        <div id="categorias-container" class="categorias-slider"></div>
        <h2 class="section-title">Explorar Lojas</h2>
        <div id="lista-lojas" class="grid-lojas"></div>
    </main>

    <script type="module" src="./js/firebase-config.js"></script>
    <script type="module" src="./js/cart-helper.js"></script>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { atualizarCarrinhoFlutuante } from './js/cart-helper.js';

        // Lógica de Busca
        const inputBusca = document.getElementById('input-busca');
        inputBusca.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const valor = inputBusca.value.trim();
                if (valor !== "") {
                    window.location.href = `html/pesquisa.html?busca=${encodeURIComponent(valor)}`;
                }
            }
        });

        // Inicialização de interface
        atualizarCarrinhoFlutuante();
        renderizarCategorias();
        renderizarLojas();

        async function renderizarCategorias() {
            const container = document.getElementById('categorias-container');
            try {
                const q = query(collection(db, "categorias"), orderBy("nome", "asc"));
                const querySnapshot = await getDocs(q);
                container.innerHTML = ""; 
                querySnapshot.forEach((doc) => {
                    const cat = doc.data();
                    const div = document.createElement('div');
                    div.className = 'cat-item';
                    div.innerText = cat.nome;
                    div.onclick = () => window.location.href = `html/pesquisa.html?categoria=${encodeURIComponent(cat.slug || cat.nome)}`;
                    container.appendChild(div);
                });
            } catch (e) { container.innerHTML = "Erro ao carregar categorias."; }
        }

        async function renderizarLojas() {
            const lista = document.getElementById('lista-lojas');
            try {
                const querySnapshot = await getDocs(collection(db, "lojas"));
                lista.innerHTML = ""; 
                querySnapshot.forEach(doc => {
                    const d = doc.data();
                    lista.innerHTML += `
                        <div class="card-loja" onclick="window.location.href='html/loja.html?loja=${doc.id}'">
                            <div class="banner-loja" style="background-color: ${d.temaLoja || '#ff4757'}">
                                <img src="${d.logoLoja || 'assets/images/default-loja.png'}" class="logo-loja" alt="Logo">
                            </div>
                            <div class="info-loja">
                                <h3>${d.nome}</h3>
                                <p>${d.categoria} • ${d.bairroLoja || 'Centro'}</p>
                            </div>
                        </div>`;
                });
            } catch (e) { lista.innerHTML = "<p>Erro ao carregar lojas.</p>"; }
        }
    </script>
</body>
</html>
